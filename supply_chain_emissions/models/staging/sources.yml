version: 2

sources:
  - name: sustainability_raw
    description: Raw supply chain emissions data loaded from Unity Catalog volume into Databricks.
    catalog: main
    schema: sustainability_raw

    tables:
      - name: raw_supply_chain_emission_factors
        description: Raw NAICS-based supply chain GHG emission factors dataset.

        columns:
          - name: naics_code
            tests:
              - not_null

          - name: emission_factor_with_margins
            tests:
              - not_null